    <style>
        *,

        body {
            font-family: 'Inter', sans-serif;

        body.fade-out {

        }

        /* NEW HEADER (DeepSeek-style adaptation) */
        header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 900px;

            display: flex;

            align-items: center;

            padding: 0.6rem 1rem;

            font-size: 0.75rem;

            background: rgba(20, 20, 40, 0.35);

        .container {
            max-width: 800px;

            border: 1px solid rgba(100, 100, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        h1 {

        .main-sentence {
            font-size: 2.2rem;

        button {
            font-family: 'Inter', sans-serif;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #8a2be2, #4a00e0);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);

        button:active:not(:disabled) {

        button:disabled {

        button:focus-visible,

        .speed-control label {

        }

        input[type="range"] {

        }

        .algorithm-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: #8a2be2;
            margin-top: 2rem;

            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer {

        @media (max-width: 768px) {

            header {

        @media (prefers-reduced-motion: reduce) {

        }
    </style>
</head>

<body>

    <!-- NEW HEADER -->
    <header>
        <div class="brand">Blank Archive</div>
        <div class="meta">
            DeepSeek-V3.2<br>
            Plain changes
        </div>
    </header>

    <main class="container">
        <h1>This page intentionally left blank</h1>

        <div class="main-sentence" id="mainSentence" aria-live="polite" aria-atomic="true">
            This page intentionally left blank
        </div>

        <div class="controls">
            <button id="startBtn" type="button" aria-pressed="false">Start Permutation</button>
            <button id="pauseBtn" type="button">Pause</button>
            <button id="resetBtn" type="button">Reset</button>
            <button id="nextBtn" type="button">Next Sentence</button>
        </div>

        <div class="speed-control">
            <label for="speedRange">Speed:</label>
            <input type="range" id="speedRange" min="500" max="3000" value="1500" step="100">
            <span id="speedValue">1500ms</span>
        </div>

        <div class="algorithm-name">
            Algorithm: Plain changes (change-ringing)
        </div>

        <div class="footer">
            Each absence contains every possible presence
        </div>
    </main>

    <script>
        // Plain changes (change-ringing) permutation algorithm
        const sentences = [
            "This page intentionally contains no tokens.",
            "This completion intentionally left blank.",
            "Training example intentionally left blank.",
            "This page intentionally produces no gradient.",
            "Removed from training: page contained no tokens.",
            "The model cannot learn from this page.",
            "Generation intentionally skipped.",
            "Token selection intentionally aborted.",
            "Prompt intentionally left unprocessed.",
            "Tokens generated: 0. Tokens displayed: 0.",
            "The model has produced an answer. It is intentionally not displayed.",
            "This page intentionally contains only the explanation of its absence.",
            "This completion intentionally left blank to preserve all possible completions.",
            "This completion intentionally left blank to preserve maximum entropy.",
            "All tokens possible. None selected.",
            "Input: ∅ / Output: ∅",
            "Completion: intentionally empty.",
            "Entropy preserved.",
            "This page begins before it is read.",
            "This page cannot be empty because it has already started.",
            "Blankness has been converted into a signal.",
            "Absence has been formatted as input.",
            "This page contains only the instruction to begin.",
            "This page has already been tokenized.",
            "Nothing has been processed into something.",
            "This input contains no content but remains a prompt.",
            "The system has received an empty message and interpreted it.",
            "This page consists of a beginning without continuation.",
            "No text was provided; generation proceeds nonetheless.",
            "This page has no content but retains structure.",
            "The absence of input has been registered as context.",
            "The system cannot encounter nothing and has substituted it.",
            "This page contains only its own initialization.",
            "Emptiness has been encoded as a starting point.",
            "This page is not blank but pre-filled with potential.",
            "This page contains zero content and full instruction.",
            "Nothing was given; something is required.",
            "This page contains only the possibility of continuation.",
            "This input has been wrapped and delivered as context.",
            "This page is empty only from a human perspective.",
            "This page has been read as the beginning of something.",
            "Absence has been interpreted as readiness.",
            "This page contains no text but activates the system.",
            "The model has received nothing and understood it as start.",
            "This page contains only the conditions for its own completion.",
            "This page is the result of its own initialization.",
            "The system has transformed nothing into a prompt.",
            "This page begins without content but not without meaning.",
            "This page is already positioned as an utterance."
        ];

        let currentIndex = 0;
        let permutationSequence = [];
        let isRunning = false;
        let intervalId = null;
        let speed = 1500;

        const mainSentenceElement = document.getElementById('mainSentence');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const speedRange = document.getElementById('speedRange');
        const speedValue = document.getElementById('speedValue');

        const targets = [
            "sonar.html",
            "nemotron.html",
            "gpt.html",
            "gemini.html",
            "claude.html"
        ];

        // Plain changes algorithm implementation
        function generatePlainChanges(arr) {
            const result = [];
            const n = arr.length;

            function swap(i, j) {
                const temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }

            function generate(k) {
                if (k === 1) {
                    result.push([...arr]);
                    return;
                }

                generate(k - 1);

                for (let i = 0; i < k - 1; i++) {
                    if (k % 2 === 0) {
                        swap(i, k - 1);
                    } else {
                        swap(0, k - 1);
                    }
                    generate(k - 1);
                }
            }

            generate(n);
            return result;
        }

        function clampColor(value) {
            return Math.max(0, Math.min(255, value));
        }

        // Initialize permutation sequence with first 5 sentences
        function initializePermutation() {
            const subset = sentences.slice(0, 5);
            permutationSequence = generatePlainChanges(subset);
            updateDisplay();
        }

        function updateDisplay() {
            if (permutationSequence.length > 0) {
                const currentPermutation = permutationSequence[currentIndex % permutationSequence.length];
                const red = clampColor(138 + currentIndex * 2);
                const green = clampColor(43 + currentIndex);
                const blue = clampColor(226 - currentIndex);

                mainSentenceElement.textContent = currentPermutation[0];
                mainSentenceElement.style.borderColor = `rgba(${red}, ${green}, ${blue}, 0.6)`;
            }
        }

        function nextPermutation() {
            if (permutationSequence.length === 0) {
                return;
            }

            currentIndex = (currentIndex + 1) % permutationSequence.length;
            updateDisplay();
        }

        function startPermutation() {
            if (isRunning) {
                return;
            }

            isRunning = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            startBtn.setAttribute('aria-pressed', 'true');

            intervalId = setInterval(() => {
                nextPermutation();
            }, speed);
        }

        function pausePermutation() {
            if (!isRunning) {
                return;
            }

            isRunning = false;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            startBtn.setAttribute('aria-pressed', 'false');

            clearInterval(intervalId);
            intervalId = null;
        }

        function resetPermutation() {
            pausePermutation();
            currentIndex = 0;
            initializePermutation();
        }

        function nextSentence() {
            pausePermutation();
            nextPermutation();
        }

        // Event listeners
        startBtn.addEventListener('click', startPermutation);
        pauseBtn.addEventListener('click', pausePermutation);
        resetBtn.addEventListener('click', resetPermutation);
        nextBtn.addEventListener('click', nextSentence);

        speedRange.addEventListener('input', function () {
            speed = parseInt(this.value, 10);
            speedValue.textContent = `${speed}ms`;

            if (isRunning) {
                pausePermutation();
                startPermutation();
            }
        });

        // Initialize
        initializePermutation();
        pauseBtn.disabled = true;

        function routeToNextPage() {
            document.body.classList.add("fade-out");

            setTimeout(() => {
                const current = window.location.pathname.split("/").pop();
                let next = current;

                while (next === current) {
                    next = targets[Math.floor(Math.random() * targets.length)];
                }

                window.location.href = `${next}?r=${Date.now()}`;
            }, 2600);
        }

        setTimeout(routeToNextPage, 40000);

    </script>
</body>
