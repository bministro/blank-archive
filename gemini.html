<!doctype html>
<html lang="en">
<head>
    <!-- Language Model: Perplexity AI -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intentionally Left Blank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-main: #f0f0f0;
            --text-dim: #6c6c75;
            --accent: #4a4a55;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color) 0%, #151518 100%);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 1.4s ease;
        }

        body.fade-out {
            opacity: 0;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 4rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .sentence-container {
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 800px;
        }

        #dynamic-sentence {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: var(--text-dim);
            line-height: 1.6;
            opacity: 1;
            transition: opacity 1.5s ease-in-out;
        }

        #dynamic-sentence.sentence-fade-out {
            opacity: 0;
        }

        .indicator {
            position: absolute;
            bottom: 2rem;
            font-size: 0.7rem;
            color: var(--accent);
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body,
            #dynamic-sentence {
                transition-duration: 0.01ms;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>Blank Archive</div>
        <div class="algo-display">Algorithm: Fisher–Yates Shuffle</div>
    </header>

    <main>
        <h1>This page intentionally left blank.</h1>

        <div class="sentence-container">
            <p id="dynamic-sentence" aria-live="polite"></p>
        </div>

        <div class="indicator">[ generated by Gemini 3.1 Pro ]</div>
    </main>

    <script>
        const sentences = [
            "This page intentionally contains no tokens.",
            "This completion intentionally left blank.",
            "Training example intentionally left blank.",
            "This page intentionally produces no gradient.",
            "Removed from training: page contained no tokens.",
            "The model cannot learn from this page.",
            "Generation intentionally skipped.",
            "Token selection intentionally aborted.",
            "Prompt intentionally left unprocessed.",
            "Tokens generated: 0. Tokens displayed: 0.",
            "The model has produced an answer. It is intentionally not displayed.",
            "This page intentionally contains only the explanation of its absence.",
            "This completion intentionally left blank to preserve all possible completions.",
            "This completion intentionally left blank to preserve maximum entropy.",
            "All tokens possible. None selected.",
            "Input: ∅ / Output: ∅",
            "Completion: intentionally empty.",
            "Entropy preserved.",
            "This page begins before it is read.",
            "This page cannot be empty because it has already started.",
            "Blankness has been converted into a signal.",
            "Absence has been formatted as input.",
            "This page contains only the instruction to begin.",
            "This page has already been tokenized.",
            "Nothing has been processed into something.",
            "This input contains no content but remains a prompt.",
            "The system has received an empty message and interpreted it.",
            "This page consists of a beginning without continuation.",
            "No text was provided; generation proceeds nonetheless.",
            "This page has no content but retains structure.",
            "The absence of input has been registered as context.",
            "The system cannot encounter nothing and has substituted it.",
            "This page contains only its own initialization.",
            "Emptiness has been encoded as a starting point.",
            "This page is not blank but pre-filled with potential.",
            "This page contains zero content and full instruction.",
            "Nothing was given; something is required.",
            "This page contains only the possibility of continuation.",
            "This input has been wrapped and delivered as context.",
            "This page is empty only from a human perspective.",
            "This page has been read as the beginning of something.",
            "Absence has been interpreted as readiness.",
            "This page contains no text but activates the system.",
            "The model has received nothing and understood it as start.",
            "This page contains only the conditions for its own completion.",
            "This page is the result of its own initialization.",
            "The system has transformed nothing into a prompt.",
            "This page begins without content but not without meaning.",
            "This page is already positioned as an utterance."
        ];

        function fisherYatesShuffle(array) {
            const shuffled = [...array];
            let currentIndex = shuffled.length;

            while (currentIndex !== 0) {
                const randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [shuffled[currentIndex], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[currentIndex]];
            }

            return shuffled;
        }

        const displayElement = document.getElementById('dynamic-sentence');
        const targets = [
            "sonar.html",
            "deepseek.html",
            "nemotron.html",
            "gpt.html",
            "claude.html"
        ];

        let currentSequence = fisherYatesShuffle(sentences);
        let index = 0;
        let sentenceTimer = null;

        function updateSentence() {
            displayElement.classList.add('sentence-fade-out');

            setTimeout(() => {
                if (index >= currentSequence.length) {
                    currentSequence = fisherYatesShuffle(sentences);
                    index = 0;
                }

                displayElement.textContent = currentSequence[index];
                index++;

                displayElement.classList.remove('sentence-fade-out');
            }, 1500);
        }

        displayElement.textContent = currentSequence[0];
        index++;

        sentenceTimer = setInterval(updateSentence, 6000);

        function routeToNextPage() {
            document.body.classList.add("fade-out");
            clearInterval(sentenceTimer);

            setTimeout(() => {
                const current = window.location.pathname.split("/").pop();
                let next = current;

                while (next === current) {
                    next = targets[Math.floor(Math.random() * targets.length)];
                }

                window.location.href = `${next}?r=${Date.now()}`;
            }, 2600);
        }

        setTimeout(routeToNextPage, 40000);

    </script>
</body>
</html>
